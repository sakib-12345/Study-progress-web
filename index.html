<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #000000;
            --surface: #0d0d0d;
            --surface2: #141414;
            --border: #222;
            --cyan: #00e5ff;
            --green: #00ff88;
            --amber: #ffb300;
            --red: #ff3d57;
            --text: #e0e0e0;
            --muted: #555;
        }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 3rem;
        }

        /* NAV */
        .nav-bar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0,0,0,0.95);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 2rem;
            backdrop-filter: blur(12px);
        }

        .nav-content { max-width: 1400px; margin: 0 auto; }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            color: var(--cyan);
            letter-spacing: -0.5px;
        }

        h1 span { color: var(--muted); }

        .nav-actions { display: flex; gap: 0.75rem; }

        .add-chapter-btn {
            padding: 0.6rem 1.25rem;
            background: var(--cyan);
            border: none;
            border-radius: 6px;
            color: #000;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .add-chapter-btn:hover { background: #33eeff; transform: translateY(-1px); }

        .graph-toggle-btn {
            padding: 0.6rem 1.25rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .graph-toggle-btn:hover { border-color: var(--cyan); color: var(--cyan); }

        /* PROGRESS */
        .progress-section {
            margin-top: 1rem;
            padding: 0.9rem 1rem;
            background: var(--surface);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.8rem;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .progress-label span:last-child { color: var(--cyan); }

        .progress-bar {
            height: 4px;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--cyan), var(--green));
            transition: width 0.5s ease;
            border-radius: 4px;
        }

        /* FILTERS */
        .filter-section {
            margin-top: 0.75rem;
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.35rem 0.85rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.78rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .filter-btn:hover { border-color: var(--cyan); color: var(--cyan); }
        .filter-btn.active { background: var(--cyan); color: #000; border-color: var(--cyan); font-weight: 700; }

        /* GRAPH SECTION */
        .graph-section {
            max-width: 1400px;
            margin: 1.5rem auto 0;
            padding: 0 2rem;
            display: none;
        }

        .graph-section.visible { display: block; }

        .graph-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
        }

        .graph-card h3 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .graph-wrap {
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
            height: 160px;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .graph-wrap::-webkit-scrollbar { height: 4px; }
        .graph-wrap::-webkit-scrollbar-track { background: var(--surface2); }
        .graph-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .graph-day {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.4rem;
            min-width: 52px;
            cursor: pointer;
        }

        .graph-bar-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            width: 100%;
            height: 120px;
            justify-content: flex-end;
        }

        .graph-bar {
            width: 36px;
            border-radius: 4px 4px 0 0;
            transition: height 0.4s ease;
            position: relative;
        }

        .graph-bar:hover::after {
            content: attr(data-tip);
            position: absolute;
            bottom: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            color: var(--cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            white-space: nowrap;
            padding: 3px 6px;
            border-radius: 4px;
            border: 1px solid var(--border);
            pointer-events: none;
            z-index: 10;
        }

        .graph-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--muted);
        }

        .graph-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.65rem;
            color: var(--muted);
            white-space: nowrap;
        }

        .graph-empty {
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            padding: 2rem;
        }

        /* CHAPTER LOG */
        .log-section {
            margin-top: 1rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
        }

        .log-section h4 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .log-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            max-height: 200px;
            overflow-y: auto;
        }

        .log-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--muted);
            padding: 0.3rem 0.4rem;
            border-bottom: 1px solid #111;
            border-radius: 4px;
        }

        .log-item:hover { background: #0d0d0d; }

        .log-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--cyan);
            flex-shrink: 0;
        }

        .log-item .log-subject { color: var(--cyan); }
        .log-item .log-time { margin-left: auto; color: #333; padding-right: 0.5rem; }

        .log-delete-btn {
            background: transparent;
            border: none;
            color: #333;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0 2px;
            line-height: 1;
            transition: color 0.2s;
            flex-shrink: 0;
        }

        .log-delete-btn:hover { color: var(--red); }

        /* DAY DETAIL PANEL */
        .day-detail {
            margin-top: 1rem;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            display: none;
        }

        .day-detail.visible { display: block; }

        .day-detail h4 {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--cyan);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .graph-day.selected .graph-bar { outline: 2px solid #fff; outline-offset: 2px; }

        /* MAIN GRID */
        .container {
            max-width: 1400px;
            margin: 1.5rem auto;
            padding: 0 2rem;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
            gap: 1.5rem;
        }

        /* SUBJECT CARD */
        .subject-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
            transition: border-color 0.2s;
        }

        .subject-card:hover { border-color: #333; }

        .subject-header {
            margin-bottom: 1rem;
            padding-bottom: 0.85rem;
            border-bottom: 1px solid var(--border);
        }

        .subject-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.4rem;
        }

        .subject-name {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 700;
            color: var(--cyan);
        }

        .subject-progress {
            font-size: 0.75rem;
            color: var(--muted);
            font-family: 'JetBrains Mono', monospace;
        }

        .subject-bar { height: 3px; background: #1a1a1a; border-radius: 3px; overflow: hidden; margin-top: 0.5rem; }
        .subject-bar-fill { height: 100%; background: linear-gradient(90deg, var(--cyan), var(--green)); border-radius: 3px; transition: width 0.4s; }

        /* CHAPTERS */
        .chapters-list { display: flex; flex-direction: column; gap: 0.5rem; }

        .chapter-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0.75rem;
            background: var(--surface2);
            border-radius: 6px;
            border-left: 3px solid #222;
            transition: all 0.2s;
        }

        .chapter-row:hover { background: #1a1a1a; border-left-color: var(--muted); }
        .chapter-row.read-once { border-left-color: var(--cyan); }
        .chapter-row.read-twice { border-left-color: var(--green); }
        .chapter-row.read-thrice { border-left-color: var(--amber); }

        .chapter-name {
            flex: 1;
            font-size: 0.88rem;
            color: var(--text);
            cursor: pointer;
            font-family: 'Syne', sans-serif;
        }

        .chapter-name:hover { color: var(--cyan); }

        .chapter-count {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--cyan);
            min-width: 24px;
            text-align: center;
        }

        .chapter-controls { display: flex; gap: 0.4rem; }

        .control-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 700;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
        }

        .increment-btn { background: #003d1f; color: var(--green); border: 1px solid #005a2b; }
        .increment-btn:hover { background: var(--green); color: #000; transform: scale(1.08); }
        .decrement-btn { background: #2d0010; color: var(--red); border: 1px solid #4a0018; }
        .decrement-btn:hover { background: var(--red); color: #000; transform: scale(1.08); }
        .delete-btn { background: #111; color: var(--muted); border: 1px solid var(--border); }
        .delete-btn:hover { background: var(--red); color: #000; transform: scale(1.08); }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(6px);
        }

        .modal.active { display: flex; }

        .modal-content {
            background: var(--surface);
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 440px;
            border: 1px solid var(--border);
            animation: slideIn 0.25s ease;
        }

        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            color: var(--cyan);
            margin-bottom: 1.5rem;
        }

        .form-group { margin-bottom: 1rem; }

        .form-label {
            display: block;
            margin-bottom: 0.4rem;
            color: var(--muted);
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 0.65rem 0.85rem;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'Syne', sans-serif;
            transition: border-color 0.2s;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: var(--cyan);
        }

        .form-select option { background: var(--surface2); }

        .modal-actions { display: flex; gap: 0.75rem; margin-top: 1.5rem; }

        .modal-btn {
            flex: 1;
            padding: 0.65rem;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
        }

        .save-btn { background: var(--green); color: #000; }
        .save-btn:hover { transform: translateY(-1px); }
        .cancel-btn { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
        .cancel-btn:hover { color: var(--text); }

        /* EMPTY */
        .empty-state { text-align: center; padding: 3rem; color: var(--muted); }
        .empty-state-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
        .empty-state h2 { font-size: 1rem; margin-bottom: 0.4rem; color: #333; }
        .empty-state p { font-size: 0.85rem; }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .subjects-grid { grid-template-columns: 1fr; }
            .nav-bar { padding: 1rem; }
            .container { padding: 0 1rem; }
            .graph-section { padding: 0 1rem; }
            h1 { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<!-- NAV -->
<div class="nav-bar">
    <div class="nav-content">
        <div class="nav-header">
            <h1>🎓 study<span>_</span>tracker</h1>
            <div class="nav-actions">
                <button class="graph-toggle-btn" onclick="toggleGraph()">📊 Activity</button>
                <button class="add-chapter-btn" onclick="openModal()">+ Add Chapter</button>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-label">
                <span>overall progress</span>
                <span id="overall-percentage">0/0 (0%)</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="overall-progress" style="width:0%"></div>
            </div>
        </div>

        <div class="filter-section" id="filter-section">
            <button class="filter-btn active" onclick="filterSubject('all')">All</button>
        </div>
    </div>
</div>

<!-- GRAPH -->
<div class="graph-section" id="graph-section">
    <div class="graph-card">
        <h3>📅 Daily Activity</h3>
        <div class="graph-wrap" id="graph-wrap">
            <div class="graph-empty">No activity logged yet.</div>
        </div>
        <div class="log-section">
            <h4>Recent Completions</h4>
            <div class="log-list" id="log-list">
                <div style="font-family:monospace;font-size:0.75rem;color:#333;">Nothing yet.</div>
            </div>
        </div>
    </div>
</div>

<!-- MAIN -->
<div class="container">
    <div class="subjects-grid" id="subjects-grid">
        <div class="empty-state">
            <div class="empty-state-icon">📚</div>
            <h2>No chapters yet!</h2>
            <p>Click "Add Chapter" to start tracking your HSC studies</p>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h2 class="modal-header" id="modal-title">Add New Chapter</h2>
        <div class="form-group">
            <label class="form-label">Subject</label>
            <select class="form-select" id="subject-select">
                <option value="">Select Subject</option>
                <option value="Physics-1st">Physics-1st</option>
                <option value="Physics-2nd">Physics-2nd</option>
                <option value="Chemistry-1st">Chemistry-1st</option>
                <option value="Chemistry-2nd">Chemistry-2nd</option>
                <option value="Math-1st">Math-1st</option>
                <option value="Math-2nd">Math-2nd</option>
                <option value="Botany">Botany</option>
                <option value="Zoology">Zoology</option>
                <option value="ICT">ICT</option>
            </select>
        </div>
        <div class="form-group">
            <label class="form-label">Chapter Name</label>
            <input type="text" class="form-input" id="chapter-name" placeholder="e.g., Vector">
        </div>
        <div class="modal-actions">
            <button class="modal-btn save-btn" onclick="submitChapter()">Save</button>
            <button class="modal-btn cancel-btn" onclick="closeModal()">Cancel</button>
        </div>
    </div>
</div>

<script>
    let db;
    const DB_NAME = 'HSCStudyTrackerV2';
    const DB_VERSION = 2;
    const STORE_NAME = 'chapters';
    const LOG_STORE = 'activity_log';

    const DEFAULT_CHAPTERS = {
        "Physics-1st": ["Chapter-1","Chapter-2","Chapter-3","Chapter-4","Chapter-5","Chapter-6","Chapter-7","Chapter-8","Chapter-9","Chapter-10"],
        "Physics-2nd": ["Chapter-1","Chapter-2","Chapter-3","Chapter-4","Chapter-5","Chapter-6","Chapter-7","Chapter-8","Chapter-9","Chapter-10","Chapter-11"],
        "Chemistry-1st": ["Chapter-1","Chapter-2","Chapter-3","Chapter-4","Chapter-5"],
        "Chemistry-2nd": ["Chapter-1","Chapter-2","Chapter-3","Chapter-4","Chapter-5"],
        "Math-1st": ["Chapter-1","Chapter-2","Chapter-3","Chapter-4","Chapter-5","Chapter-6","Chapter-7","Chapter-8","Chapter-9","Chapter-10"],
        "Math-2nd": ["Chapter-1","Chapter-2","Chapter-3","Chapter-4","Chapter-5","Chapter-6","Chapter-7","Chapter-8","Chapter-9","Chapter-10"],
        "Botany": ["Chapter-1","Chapter-2","Chapter-3","Chapter-4","Chapter-5","Chapter-6","Chapter-7","Chapter-8","Chapter-9","Chapter-10","Chapter-11","Chapter-12"],
        "Zoology": ["Chapter-1","Chapter-2","Chapter-3","Chapter-4","Chapter-5","Chapter-6","Chapter-7","Chapter-8","Chapter-9","Chapter-10","Chapter-11","Chapter-12"],
        "ICT": ["Chapter-1","Chapter-2","Chapter-3","Chapter-4","Chapter-5","Chapter-6"]
    };

    function initDB() {
        const req = indexedDB.open(DB_NAME, DB_VERSION);
        req.onerror = () => console.error('DB error');
        req.onsuccess = () => { db = req.result; checkAndLoad(); };
        req.onupgradeneeded = (e) => {
            db = e.target.result;
            if (!db.objectStoreNames.contains(STORE_NAME)) {
                const s = db.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                s.createIndex('subject', 'subject', { unique: false });
            }
            if (!db.objectStoreNames.contains(LOG_STORE)) {
                const l = db.createObjectStore(LOG_STORE, { keyPath: 'id', autoIncrement: true });
                l.createIndex('date', 'date', { unique: false });
            }
        };
    }

    function checkAndLoad() {
        const tx = db.transaction([STORE_NAME], 'readonly');
        const cnt = tx.objectStore(STORE_NAME).count();
        cnt.onsuccess = () => cnt.result === 0 ? loadDefaults() : loadChapters();
    }

    function loadDefaults() {
        const tx = db.transaction([STORE_NAME], 'readwrite');
        const s = tx.objectStore(STORE_NAME);
        Object.entries(DEFAULT_CHAPTERS).forEach(([sub, chs]) =>
            chs.forEach(name => s.add({ subject: sub, name, readCount: 0 }))
        );
        tx.oncomplete = loadChapters;
    }

    // === ACTIVITY LOG ===
    function todayKey() {
        const d = new Date();
        return d.toISOString().split('T')[0];
    }

    function logActivity(subject, chapterName, increment) {
        if (!increment) return; // only log increments
        const tx = db.transaction([LOG_STORE], 'readwrite');
        tx.objectStore(LOG_STORE).add({
            date: todayKey(),
            subject,
            chapter: chapterName,
            time: new Date().toISOString()
        });
    }

    function loadActivityGraph() {
        const tx = db.transaction([LOG_STORE], 'readonly');
        const req = tx.objectStore(LOG_STORE).getAll();
        req.onsuccess = () => renderGraph(req.result);
    }

    function renderGraph(logs) {
        const wrap = document.getElementById('graph-wrap');
        const logList = document.getElementById('log-list');

        if (!logs.length) {
            wrap.innerHTML = '<div class="graph-empty">No activity logged yet.</div>';
            logList.innerHTML = '<div style="font-family:monospace;font-size:0.75rem;color:#333;">Nothing yet.</div>';
            return;
        }

        // Group by date
        const byDate = {};
        logs.forEach(l => {
            if (!byDate[l.date]) byDate[l.date] = [];
            byDate[l.date].push(l);
        });

        // Last 14 days
        const days = [];
        for (let i = 13; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            days.push(d.toISOString().split('T')[0]);
        }

        const maxCount = Math.max(...days.map(d => (byDate[d] || []).length), 1);

        const subjectColors = {
            'Physics-1st': '#00e5ff', 'Physics-2nd': '#00b8d4',
            'Chemistry-1st': '#ff6f00', 'Chemistry-2nd': '#ffa000',
            'Math-1st': '#00ff88', 'Math-2nd': '#00c853',
            'Botany': '#d500f9', 'Zoology': '#aa00ff',
            'ICT': '#ffb300'
        };

        wrap.innerHTML = '';
        days.forEach(day => {
            const entries = byDate[day] || [];
            const count = entries.length;
            const barH = count > 0 ? Math.max(8, Math.round((count / maxCount) * 110)) : 0;

            // Tooltip: list chapters
            const tip = count > 0 
                ? entries.map(e => `${e.subject}: ${e.chapter}`).join(' | ') 
                : 'no activity';

            const shortDate = day.slice(5); // MM-DD

            const col = entries.length > 0
                ? (subjectColors[entries[entries.length - 1].subject] || '#00e5ff')
                : '#1a1a1a';

            const dayEl = document.createElement('div');
            dayEl.className = 'graph-day';
            dayEl.innerHTML = `
                <div class="graph-bar-wrap">
                    ${count > 0 ? `<div class="graph-count">${count}</div>` : ''}
                    <div class="graph-bar" 
                         style="height:${barH}px;background:${col};opacity:${count>0?0.85:0.15};"
                         data-tip="${tip}"></div>
                </div>
                <div class="graph-date">${shortDate}</div>
            `;
            wrap.appendChild(dayEl);
        });

        // Recent log
        const recent = [...logs].reverse().slice(0, 20);
        logList.innerHTML = recent.map(l => {
            const t = new Date(l.time);
            const time = t.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            return `
                <div class="log-item">
                    <div class="log-dot" style="background:${subjectColors[l.subject]||'#00e5ff'}"></div>
                    <span class="log-subject">${l.subject}</span>
                    <span>${l.chapter}</span>
                    <span class="log-time">${l.date} ${time}</span>
                </div>
            `;
        }).join('');
    }

    function toggleGraph() {
        const el = document.getElementById('graph-section');
        el.classList.toggle('visible');
        if (el.classList.contains('visible')) loadActivityGraph();
    }

    // === CHAPTERS ===
    function loadChapters() {
        const tx = db.transaction([STORE_NAME], 'readonly');
        const req = tx.objectStore(STORE_NAME).getAll();
        req.onsuccess = () => {
            renderChapters(req.result);
            updateFilters(req.result);
            updateOverallProgress(req.result);
        };
    }

    let currentFilter = 'all';

    function renderChapters(chapters) {
        const grid = document.getElementById('subjects-grid');

        if (!chapters.length) {
            grid.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📚</div><h2>No chapters yet!</h2><p>Click "Add Chapter" to get started</p></div>`;
            return;
        }

        const filtered = currentFilter === 'all' ? chapters : chapters.filter(c => c.subject === currentFilter);
        const subjects = {};
        filtered.forEach(c => { if (!subjects[c.subject]) subjects[c.subject] = []; subjects[c.subject].push(c); });

        grid.innerHTML = '';
        Object.entries(subjects).forEach(([subject, chs]) => {
            const done = chs.filter(c => c.readCount > 0).length;
            const pct = chs.length > 0 ? Math.round((done / chs.length) * 100) : 0;

            const card = document.createElement('div');
            card.className = 'subject-card';
            card.innerHTML = `
                <div class="subject-header">
                    <div class="subject-top">
                        <div class="subject-name">${subject}</div>
                        <div class="subject-progress">${done}/${chs.length} · ${pct}%</div>
                    </div>
                    <div class="subject-bar"><div class="subject-bar-fill" style="width:${pct}%"></div></div>
                </div>
                <div class="chapters-list">
                    ${chs.map(ch => {
                        let cls = '';
                        if (ch.readCount === 1) cls = 'read-once';
                        else if (ch.readCount === 2) cls = 'read-twice';
                        else if (ch.readCount >= 3) cls = 'read-thrice';
                        return `
                            <div class="chapter-row ${cls}">
                                <div class="chapter-name" onclick="editChapter(${ch.id})">${ch.name}</div>
                                <div class="chapter-count">${ch.readCount}</div>
                                <div class="chapter-controls">
                                    <button class="control-btn increment-btn" onclick="changeRead(${ch.id}, 1, '${subject}', '${ch.name.replace(/'/g,"\\'")}')">+</button>
                                    <button class="control-btn decrement-btn" onclick="changeRead(${ch.id}, -1, '${subject}', '${ch.name.replace(/'/g,"\\'")}')">−</button>
                                    <button class="control-btn delete-btn" onclick="deleteChapter(${ch.id})">×</button>
                                </div>
                            </div>`;
                    }).join('')}
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function updateFilters(chapters) {
        const subjects = [...new Set(chapters.map(c => c.subject))].sort();
        const fs = document.getElementById('filter-section');
        fs.innerHTML = `
            <button class="filter-btn ${currentFilter==='all'?'active':''}" onclick="filterSubject('all')">All</button>
            ${subjects.map(s => `<button class="filter-btn ${currentFilter===s?'active':''}" onclick="filterSubject('${s}')">${s}</button>`).join('')}
        `;
    }

    function filterSubject(s) { currentFilter = s; loadChapters(); }

    function updateOverallProgress(chapters) {
        const done = chapters.filter(c => c.readCount > 0).length;
        const total = chapters.length;
        const pct = total > 0 ? Math.round((done / total) * 100) : 0;
        document.getElementById('overall-progress').style.width = `${pct}%`;
        document.getElementById('overall-percentage').textContent = `${done}/${total} (${pct}%)`;
    }

    function changeRead(id, delta, subject, chapterName) {
        const tx = db.transaction([STORE_NAME], 'readwrite');
        const s = tx.objectStore(STORE_NAME);
        const req = s.get(id);
        req.onsuccess = () => {
            const ch = req.result;
            const wasZero = ch.readCount === 0;
            ch.readCount = Math.max(0, ch.readCount + delta);
            s.put(ch);
            // Log if incrementing (counts as a "read")
            if (delta > 0) logActivity(subject, chapterName, true);
            // Also log first read specially if going from 0 to 1
        };
        tx.oncomplete = () => {
            loadChapters();
            const graphVisible = document.getElementById('graph-section').classList.contains('visible');
            if (graphVisible) loadActivityGraph();
        };
    }

    function deleteChapter(id) {
        if (!confirm('Delete this chapter?')) return;
        const tx = db.transaction([STORE_NAME], 'readwrite');
        tx.objectStore(STORE_NAME).delete(id);
        tx.oncomplete = loadChapters;
    }

    // === MODAL ===
    let editingId = null;

    function openModal(id = null) {
        editingId = id;
        document.getElementById('modal-title').textContent = id ? 'Edit Chapter' : 'Add New Chapter';
        document.getElementById('subject-select').value = '';
        document.getElementById('chapter-name').value = '';

        if (id) {
            const tx = db.transaction([STORE_NAME], 'readonly');
            const req = tx.objectStore(STORE_NAME).get(id);
            req.onsuccess = () => {
                document.getElementById('subject-select').value = req.result.subject;
                document.getElementById('chapter-name').value = req.result.name;
            };
        }
        document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
        editingId = null;
    }

    function editChapter(id) { openModal(id); }

    function submitChapter() {
        const subject = document.getElementById('subject-select').value;
        const name = document.getElementById('chapter-name').value.trim();
        if (!subject || !name) return;

        const tx = db.transaction([STORE_NAME], 'readwrite');
        const s = tx.objectStore(STORE_NAME);
        const ch = { subject, name, readCount: 0 };
        if (editingId) { ch.id = editingId; s.put(ch); }
        else { s.add(ch); }
        tx.oncomplete = () => { loadChapters(); closeModal(); };
    }

    document.getElementById('modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });

    initDB();
</script>
</body>
</html>
